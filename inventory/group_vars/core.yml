---
# ===========================================================================
# Variables de la AGREGACIÓN (templates/vsx.j2) — par VSX 8325
# Hereda de all.yml: site, dns_resolver_*, snmp_user, breakglass_user.
# Lo per-NODO (vsx_role, svi_*_ip reales, keepalive, router-id, hostname)
# va en host_vars/agg-01.yml y host_vars/agg-02.yml.
# ===========================================================================

# NTP upstream del fleet: el VSX sincroniza de aquí (salida acotada en el FW).
ntp_upstream: 1.1.1.1

# Tránsitos L3 (lado VSX)
trunk_fw_ip: 10.20.200.1        # /30 hacia el firewall (iBGP)
trunk_gw_ip: 10.20.210.1        # /29 hacia el clúster 9012 (rutas estáticas)

# BGP interno
bgp_asn: 65010                  # ASN privado (iBGP VSX <-> Palo Alto)

# --- Referencia: variables per-nodo (van en host_vars) ---
# agg-01: vsx_role=primary,   svi_mgmt_ip=10.20.10.2, svi_apmgmt_ip=10.20.16.2,
#         svi_gwmgmt_ip=10.20.12.2, svi_servers_ip=10.20.20.2,
#         vsx_keepalive_src=10.20.10.2, vsx_keepalive_peer=10.20.10.3,
#         bgp_router_id=10.20.10.2
# agg-02: vsx_role=secondary, svi_mgmt_ip=10.20.10.3, svi_apmgmt_ip=10.20.16.3,
#         svi_gwmgmt_ip=10.20.12.3, svi_servers_ip=10.20.20.3,
#         vsx_keepalive_src=10.20.10.3, vsx_keepalive_peer=10.20.10.2,
#         bgp_router_id=10.20.10.3
