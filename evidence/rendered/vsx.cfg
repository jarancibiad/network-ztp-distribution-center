hostname agg-01

ip dns server-address 1.1.1.1
ntp server 1.1.1.1              ntp enable

vlan 10
    name MGMT
vlan 11
    name AP-MGMT
vlan 12
    name GW-MGMT
vlan 20
    name SERVERS
vlan 99
    name NATIVE-BLACKHOLE

interface lag 256
    description VSX-ISL
    no shutdown
    no routing
    vlan trunk native 1 tag
    vlan trunk allowed all
    lacp mode active
interface 1/1/49,1/1/50                         lag 256
vsx
    system-mac 02:01:00:00:01:00
    inter-switch-link lag 256
    role primary                          keepalive peer 10.20.10.3 source 10.20.10.2 vrf mgmt
    vsx-sync vlans aaa snmp ssh time

interface vlan 10
    ip address 10.20.10.2/24              active-gateway ip 10.20.10.1 mac 02:00:00:00:00:01
interface vlan 11
    ip address 10.20.16.2/22
    active-gateway ip 10.20.16.1 mac 02:00:00:00:00:01
interface vlan 12
    ip address 10.20.12.2/24
    active-gateway ip 10.20.12.1 mac 02:00:00:00:00:01
interface vlan 20
    ip address 10.20.20.2/24
    active-gateway ip 10.20.20.1 mac 02:00:00:00:00:01

dhcp-server vrf default
    pool AP-MGMT
        range 10.20.16.50 10.20.19.250              default-router 10.20.16.1                   dns-server 1.1.1.1
        lease 1:0:0:0                           exclude-address 10.20.16.1                  exclude-address 10.20.16.2                  exclude-address 10.20.16.3              
interface lag 100
    description TO-FIREWALL-TRUST
    no shutdown
    routing
    ip address 10.20.200.1/30              lacp mode active
interface 1/1/51
    lag 100

interface lag 110
    description TO-GW9012
    no shutdown
    routing
    ip address 10.20.210.1/29              lacp mode active
interface 1/1/52
    lag 110

ip route 10.20.30.0/23 10.20.210.2          ip route 10.20.40.0/22 10.20.210.2          ip route 10.20.60.0/22 10.20.210.2          
router bgp 65010                          bgp router-id 10.20.10.2
    neighbor 10.20.200.2 remote-as 65010         address-family ipv4 unicast
        neighbor 10.20.200.2 activate
        network 10.20.10.0/24
        network 10.20.16.0/22
        network 10.20.12.0/24
        network 10.20.20.0/24
        network 10.20.30.0/23                        network 10.20.40.0/22
        network 10.20.60.0/22

