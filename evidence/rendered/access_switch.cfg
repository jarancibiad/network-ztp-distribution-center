hostname acc-sw-r01-1

ip dns server-address 1.1.1.1
ip dns server-address 9.9.9.9

ntp server 10.20.10.2
ntp server 10.20.10.3
ntp enable

vlan 10
    name MGMT
vlan 11
    name AP-MGMT
vlan 99
    name NATIVE-BLACKHOLE

interface vlan 10
    ip address 10.20.10.11/24
    no shutdown
ip route 0.0.0.0/0 10.20.10.1      
interface 1/1/1-1/1/12
    description AP-635
    no routing
    vlan access 11
    power-over-ethernet
    poe-priority high
    lldp transmit
    lldp receive
    lldp med-tlv-select poe
    spanning-tree bpdu-guard
    spanning-tree port-type admin-edge
    loop-protect
    port-access port-security
        client-limit 1                             enable
    no shutdown

interface 1/1/13-1/1/24
    description UNUSED
    shutdown

interface lag 1
    description UPLINK-TO-VSX
    no routing
    vlan trunk native 99
    vlan trunk allowed 10,11    lacp mode active
interface 1/1/25-1/1/26
    description UPLINK-MEMBER
    lag 1
    no shutdown

spanning-tree
spanning-tree mode mstp
spanning-tree config-name CD-PRINCIPAL

user admin-bg group administrators password ciphertext REF

snmpv3 user meli-ro auth sha auth-pass plaintext REF priv aes priv-pass plaintext REF

ssh server vrf default
no telnet-server

